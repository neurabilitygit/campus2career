name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rising_senior_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rising_senior_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure API CI env
        run: |
          cat > apps/api/.env.local <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rising_senior_ci
          EOF

      - name: Typecheck
        run: pnpm typecheck

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Seed deterministic CI baseline
        run: pnpm db:seed:ci

      - name: Run synthetic scenario regression suite
        run: pnpm synthetic:run
